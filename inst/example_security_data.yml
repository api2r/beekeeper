has_security: yes
security_schemes:
- name: api_key
  description: Example API authentication key used to authorize requests.
  parameter_name: key
  arg_name: key
  location: query
  type: api_key
  api_key: yes
- name: api_token
  description: Example API token used to authorize requests.
  parameter_name: token
  arg_name: token
  location: query
  type: api_key
  api_key: yes
security_arg_names:
- key
- token
security_arg_list: key = key, token = token
security_arg_helps:
- name: key
  description: Example API authentication key used to authorize requests.
- name: token
  description: Example API token used to authorize requests.
security_arg_nulls: key = NULL, token = NULL
security_signature: |-
  key = Sys.getenv("TRELLO_KEY"),
  token = Sys.getenv("TRELLO_TOKEN")
